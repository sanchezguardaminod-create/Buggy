<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>Reception — Requests</title>
<script src="firebase.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #ffffff;
  --bg2:     #f5f5f4;
  --text:    #1a1a1a;
  --text2:   #6b7280;
  --border:  #e5e7eb;
  --radius:  14px;
  --red:     #dc2626;
  --amber:   #d97706;
  --blue:    #2563eb;
  --green:   #16a34a;
}
html, body { min-height: 100vh; background: var(--bg2); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

.topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
.topbar h1 { font-size: 16px; font-weight: 600; color: var(--text); }
.topbar span { font-size: 12px; color: var(--text2); }

.page { max-width: 560px; margin: 0 auto; padding: 20px 16px 40px; }

/* TYPE SELECTOR */
.type-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
.type-btn { padding: 14px 8px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--bg); cursor: pointer; text-align: center; transition: all .15s; }
.type-btn .icon { font-size: 22px; display: block; margin-bottom: 6px; }
.type-btn .label { font-size: 13px; font-weight: 600; color: var(--text2); }
.type-btn:hover { border-color: var(--text); }
.type-btn.active-buggy   { border-color: var(--amber); background: #fffbeb; }
.type-btn.active-buggy .label { color: var(--amber); }
.type-btn.active-move    { border-color: var(--blue);  background: #eff6ff; }
.type-btn.active-move .label  { color: var(--blue); }
.type-btn.active-depart  { border-color: var(--red);   background: #fff1f2; }
.type-btn.active-depart .label{ color: var(--red); }

/* FORM */
.form-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px; display: none; }
.form-card.visible { display: block; }
.form-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 16px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.field input { width: 100%; padding: 11px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 16px; font-weight: 500; color: var(--text); background: var(--bg); outline: none; }
.field input:focus { border-color: var(--text); }
.field input::placeholder { font-weight: 400; color: var(--text2); font-size: 14px; }
.field select { width: 100%; padding: 11px 14px; border: 0.5px solid var(--border); border-radius: 10px; font-size: 15px; color: var(--text); background: var(--bg); outline: none; }

/* PAX */
.pax-row { display: flex; align-items: center; gap: 0; border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
.pax-btn { width: 52px; height: 52px; border: none; background: var(--bg2); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pax-btn:active { background: var(--border); }
.pax-btn:disabled { opacity: .25; }
.pax-center { flex: 1; text-align: center; }
.pax-num  { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
.pax-word { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* SUBMIT */
.submit-btn { width: 100%; margin-top: 16px; padding: 14px; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; transition: opacity .12s; }
.submit-btn:active { opacity: .8; }
.submit-btn:disabled { opacity: .35; cursor: not-allowed; }
.submit-btn.buggy  { background: var(--amber); }
.submit-btn.move   { background: var(--blue); }
.submit-btn.depart { background: var(--red); }

/* SUCCESS */
.success { display: none; text-align: center; padding: 2rem 1rem; }
.ok-ring { width: 60px; height: 60px; border-radius: 50%; background: #dcfce7; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 28px; }
.success h2 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.success p  { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
.new-btn { background: none; border: 0.5px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: var(--radius); font-size: 13px; cursor: pointer; }

.err-msg { display: none; background: #fee2e2; color: #991b1b; font-size: 13px; padding: 10px 14px; border-radius: 10px; margin-top: 10px; text-align: center; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Reception — New Request</h1>
  <span id="clock">—</span>
</div>

<div class="page">

  <div class="type-row">
    <button class="type-btn" id="btn-buggy" onclick="setType('buggy')">
      <span class="icon">🛺</span>
      <span class="label">Buggy</span>
    </button>
    <button class="type-btn" id="btn-move" onclick="setType('move')">
      <span class="icon">🔄</span>
      <span class="label">Room move</span>
    </button>
    <button class="type-btn" id="btn-depart" onclick="setType('depart')">
      <span class="icon">🧳</span>
      <span class="label">Departure</span>
    </button>
  </div>

  <!-- BUGGY FORM -->
  <div class="form-card" id="form-buggy">
    <div class="form-title">🛺 Buggy request</div>
    <div class="field">
      <label>Pickup station</label>
      <select id="buggy-station">
        <option value="">— Select station —</option>
        <optgroup label="Restaurants">
          <option value="Restaurante Sa Marina|R">Restaurante Sa Marina</option>
          <option value="Restaurante Es Molí|R">Restaurante Es Molí</option>
          <option value="Restaurante La Terraza|R">Restaurante La Terraza</option>
          <option value="Beach Club|R">Beach Club</option>
          <option value="Restaurante Los Pinos|R">Restaurante Los Pinos</option>
          <option value="Restaurante Sa Bassa|R">Restaurante Sa Bassa</option>
          <option value="Pool Bar|R">Pool Bar</option>
          <option value="Sunset Lounge|R">Sunset Lounge</option>
          <option value="Restaurante Es Racó|R">Restaurante Es Racó</option>
          <option value="Chiringuito Sur|R">Chiringuito Sur</option>
        </optgroup>
        <optgroup label="Stations">
          <option value="Main Reception|E">Main Reception</option>
          <option value="Motor Lobby|E">Motor Lobby</option>
          <option value="Central Pool|E">Central Pool</option>
          <option value="Beach|E">Beach</option>
          <option value="Spa & Wellness|E">Spa & Wellness</option>
          <option value="South Gardens|E">South Gardens</option>
        </optgroup>
        <optgroup label="Room blocks">
          <option value="Block 1000|B">Block 1000</option>
          <option value="Block 2000|B">Block 2000 ⚡</option>
          <option value="Block 3000|B">Block 3000</option>
          <option value="Block 4000|B">Block 4000</option>
          <option value="Block 5000|B">Block 5000</option>
          <option value="Block 6000|B">Block 6000 ⚡</option>
          <option value="Block 7000|B">Block 7000</option>
        </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Passengers</label>
      <div class="pax-row">
        <button class="pax-btn" id="b-minus" onclick="chPax(-1)" disabled>−</button>
        <div class="pax-center">
          <div class="pax-num" id="b-pax">1</div>
          <div class="pax-word" id="b-word">passenger</div>
        </div>
        <button class="pax-btn" id="b-plus" onclick="chPax(1)">+</button>
      </div>
    </div>
    <div id="buggy-success" class="success">
      <div class="ok-ring">✓</div>
      <h2>Buggy requested</h2>
      <p id="buggy-succ-msg"></p>
      <button class="new-btn" onclick="resetForm('buggy')">New request</button>
    </div>
    <div id="buggy-form-inner">
      <button class="submit-btn buggy" onclick="sendBuggy()">Send buggy request</button>
      <div class="err-msg" id="buggy-err">Connection error. Please try again.</div>
    </div>
  </div>

  <!-- ROOM MOVE FORM -->
  <div class="form-card" id="form-move">
    <div class="form-title">🔄 Room move</div>
    <div class="field">
      <label>From room</label>
      <input type="number" id="move-from" inputmode="numeric" placeholder="e.g. 3042">
    </div>
    <div class="field">
      <label>To room</label>
      <input type="number" id="move-to" inputmode="numeric" placeholder="e.g. 6018">
    </div>
    <div id="move-success" class="success">
      <div class="ok-ring">✓</div>
      <h2>Room move sent</h2>
      <p id="move-succ-msg"></p>
      <button class="new-btn" onclick="resetForm('move')">New request</button>
    </div>
    <div id="move-form-inner">
      <button class="submit-btn move" onclick="sendMove()">Send room move</button>
      <div class="err-msg" id="move-err">Connection error. Please try again.</div>
    </div>
  </div>

  <!-- DEPARTURE FORM -->
  <div class="form-card" id="form-depart">
    <div class="form-title">🧳 Departure — collect luggage</div>
    <div class="field">
      <label>Room number</label>
      <input type="number" id="depart-room" inputmode="numeric" placeholder="e.g. 4021">
    </div>
    <div id="depart-success" class="success">
      <div class="ok-ring">✓</div>
      <h2>Departure sent</h2>
      <p id="depart-succ-msg"></p>
      <button class="new-btn" onclick="resetForm('depart')">New request</button>
    </div>
    <div id="depart-form-inner">
      <button class="submit-btn depart" onclick="sendDepart()">Send departure request</button>
      <div class="err-msg" id="depart-err">Connection error. Please try again.</div>
    </div>
  </div>

</div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let pax = 1;
let currentType = null;

// Clock
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}, 1000);

function setType(type) {
  currentType = type;
  ['buggy','move','depart'].forEach(t => {
    document.getElementById('btn-' + t).className = 'type-btn' + (t === type ? ' active-' + t : '');
    document.getElementById('form-' + t).className = 'form-card' + (t === type ? ' visible' : '');
  });
}

function chPax(d) {
  pax = Math.max(1, Math.min(8, pax + d));
  document.getElementById('b-pax').textContent  = pax;
  document.getElementById('b-word').textContent = pax === 1 ? 'passenger' : 'passengers';
  document.getElementById('b-minus').disabled   = pax <= 1;
  document.getElementById('b-plus').disabled    = pax >= 8;
}

async function sendBuggy() {
  const sel = document.getElementById('buggy-station').value;
  if (!sel) { document.getElementById('buggy-station').style.borderColor = '#dc2626'; return; }
  document.getElementById('buggy-station').style.borderColor = '';
  const [station, type] = sel.split('|');
  const priority = station.includes('2000') || station.includes('6000');
  const req = { station, type, priority, pax, room: null, status: 'pending', driver: null, requestType: 'buggy', createdAt: Date.now(), acceptedAt: null, completedAt: null };
  try {
    await db.ref('requests').push(req);
    document.getElementById('buggy-form-inner').style.display = 'none';
    document.getElementById('buggy-success').style.display = 'block';
    document.getElementById('buggy-succ-msg').innerHTML = `<strong>${station}</strong> · ${pax} ${pax===1?'passenger':'passengers'}`;
  } catch(e) { document.getElementById('buggy-err').style.display = 'block'; }
}

async function sendMove() {
  const from = document.getElementById('move-from').value.trim();
  const to   = document.getElementById('move-to').value.trim();
  if (!from || !to) {
    if (!from) document.getElementById('move-from').style.borderColor = '#dc2626';
    if (!to)   document.getElementById('move-to').style.borderColor   = '#dc2626';
    return;
  }
  const req = { station: `Room ${from}`, type: 'M', priority: false, pax: 0, room: from, roomTo: to, status: 'pending', driver: null, requestType: 'move', createdAt: Date.now(), acceptedAt: null, completedAt: null };
  try {
    await db.ref('requests').push(req);
    document.getElementById('move-form-inner').style.display = 'none';
    document.getElementById('move-success').style.display = 'block';
    document.getElementById('move-succ-msg').innerHTML = `Room <strong>${from}</strong> → Room <strong>${to}</strong>`;
  } catch(e) { document.getElementById('move-err').style.display = 'block'; }
}

async function sendDepart() {
  const room = document.getElementById('depart-room').value.trim();
  if (!room) { document.getElementById('depart-room').style.borderColor = '#dc2626'; return; }
  const req = { station: `Room ${room}`, type: 'D', priority: false, pax: 0, room, status: 'pending', driver: null, requestType: 'depart', createdAt: Date.now(), acceptedAt: null, completedAt: null };
  try {
    await db.ref('requests').push(req);
    document.getElementById('depart-form-inner').style.display = 'none';
    document.getElementById('depart-success').style.display = 'block';
    document.getElementById('depart-succ-msg').innerHTML = `Collect luggage from Room <strong>${room}</strong> → Luggage Room`;
  } catch(e) { document.getElementById('depart-err').style.display = 'block'; }
}

function resetForm(type) {
  if (type === 'buggy') {
    pax = 1; chPax(0);
    document.getElementById('buggy-station').value = '';
    document.getElementById('buggy-form-inner').style.display = 'block';
    document.getElementById('buggy-success').style.display = 'none';
    document.getElementById('buggy-err').style.display = 'none';
  } else if (type === 'move') {
    document.getElementById('move-from').value = '';
    document.getElementById('move-to').value = '';
    document.getElementById('move-from').style.borderColor = '';
    document.getElementById('move-to').style.borderColor = '';
    document.getElementById('move-form-inner').style.display = 'block';
    document.getElementById('move-success').style.display = 'none';
    document.getElementById('move-err').style.display = 'none';
  } else if (type === 'depart') {
    document.getElementById('depart-room').value = '';
    document.getElementById('depart-room').style.borderColor = '';
    document.getElementById('depart-form-inner').style.display = 'block';
    document.getElementById('depart-success').style.display = 'none';
    document.getElementById('depart-err').style.display = 'none';
  }
}

// Start with buggy selected
setType('buggy');
</script>
</body>
</html>
