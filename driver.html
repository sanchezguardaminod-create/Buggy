<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>Buggy — Driver</title>
<script src="firebase.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #ffffff;
  --bg2:       #f5f5f4;
  --bg3:       #eeede9;
  --text:      #1a1a1a;
  --text2:     #6b7280;
  --border:    #e5e7eb;
  --radius:    14px;
  --red:       #dc2626;
  --red-bg:    #fee2e2;
  --red-text:  #991b1b;
  --amber:     #d97706;
  --amber-bg:  #fef3c7;
  --amber-text:#92400e;
  --green:     #16a34a;
  --green-bg:  #dcfce7;
  --green-text:#14532d;
}
html, body { height: 100%; background: var(--bg2); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }

#screen-login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.login-card { background: var(--bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 1.75rem; width: 100%; max-width: 360px; }
.login-card h2 { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.login-card p  { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
.driver-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; max-height: 240px; overflow-y: auto; margin-bottom: 1.25rem; }
.d-btn { padding: 9px 6px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 13px; cursor: pointer; text-align: center; line-height: 1.3; transition: all .12s; }
.d-btn:active { background: var(--bg2); }
.d-btn.sel { background: var(--text); color: var(--bg); border-color: var(--text); }
.pin-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
.pin-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
.dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--bg2); transition: all .1s; }
.dot.filled { background: var(--text); border-color: var(--text); }
.dot.err    { background: var(--red); border-color: var(--red); }
.numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.n-btn { height: 52px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 20px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .1s; }
.n-btn:active { background: var(--bg2); }
.n-btn.del  { font-size: 15px; color: var(--text2); }
.pin-err { font-size: 12px; color: var(--red); text-align: center; min-height: 18px; margin-top: 8px; }

#screen-dash { display: none; }
.topbar { position: sticky; top: 0; z-index: 30; background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.driver-pill { display: flex; align-items: center; gap: 7px; background: var(--bg2); padding: 6px 12px; border-radius: 999px; font-size: 13px; color: var(--text2); }
.driver-pill strong { color: var(--text); font-weight: 600; }
.live { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.tb-btn { font-size: 12px; color: var(--text2); background: var(--bg); border: 1px solid var(--border); padding: 6px 10px; border-radius: 8px; cursor: pointer; }
.tb-btn:active { background: var(--bg2); }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.stat { background: var(--bg2); border-radius: 10px; padding: 10px 12px; }
.stat-n { font-size: 22px; font-weight: 700; color: var(--text); }
.stat-n.red { color: var(--red); }
.stat-l { font-size: 11px; color: var(--text2); margin-top: 1px; }
.notif-bar { display: none; align-items: center; gap: 8px; padding: 9px 14px; background: var(--amber-bg); border-bottom: 1px solid #f59e0b; font-size: 13px; color: var(--amber-text); font-weight: 500; }
.body { padding: 12px 14px 32px; }
.sec-hd { display: flex; align-items: center; justify-content: space-between; margin: 16px 0 8px; }
.sec-hd:first-child { margin-top: 0; }
.sec-name { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
.sec-ct   { font-size: 11px; background: var(--bg3); padding: 2px 8px; border-radius: 999px; color: var(--text2); }

.trip { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; border-radius: var(--radius); border: 1px solid var(--border); border-left: 3px solid #e5e7eb; padding: 10px 13px; margin-bottom: 6px; background: var(--bg); }
.trip.pending  { border-left-color: var(--red); }
.trip.prio     { border-left-color: var(--red); background: #fff9f9; }
.trip.mine     { border-left-color: var(--green); background: #f0fdf4; }
.trip.accepted { border-left-color: var(--amber); background: var(--amber-bg); }
.trip.done     { border-left-color: #d1d5db; opacity: .6; }

.trip-main { display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
.trip-loc { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }
.prio-tag { font-size: 9px; font-weight: 600; background: var(--red-bg); color: var(--red-text); padding: 1px 6px; border-radius: 999px; flex-shrink: 0; }
.trip-meta { display: flex; align-items: center; gap: 6px; flex-wrap: nowrap; flex-shrink: 0; }
.chip { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 3px; white-space: nowrap; }
.divider { width: 1px; height: 12px; background: var(--border); flex-shrink: 0; }

.age { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
.age.fresh { background: var(--green-bg); color: var(--green-text); }
.age.mid   { background: var(--amber-bg); color: var(--amber-text); }
.age.old   { background: var(--red-bg);   color: var(--red-text); }

.assigned { font-size: 11px; color: var(--amber-text); font-weight: 500; white-space: nowrap; }
.assigned.mine { color: var(--green-text); }
.done-txt { font-size: 11px; color: var(--green-text); font-weight: 500; white-space: nowrap; }

.act-btn { padding: 7px 14px; border-radius: 10px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; flex-shrink: 0; }
.act-btn:active { opacity: .8; }
.act-btn.accept   { background: var(--amber-bg); color: var(--amber-text); }
.act-btn.complete { background: var(--green-bg); color: var(--green-text); }

.empty { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 15px; }
</style>
</head>
<body>

<div id="screen-login">
  <div class="login-card">
    <h2>Start of shift</h2>
    <p>Select your name and enter your PIN</p>
    <div class="driver-grid" id="driver-grid"></div>
    <div class="pin-label">4-digit PIN</div>
    <div class="pin-dots" id="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="numpad" id="numpad"></div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<div id="screen-dash">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="live"></div>
      <div class="driver-pill">🚗 <strong id="active-name">—</strong></div>
    </div>
    <button class="tb-btn" onclick="doLogout()">End shift</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n red" id="st-pend">0</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n" id="st-acc">0</div><div class="stat-l">In progress</div></div>
    <div class="stat" onclick="toggleMyRides()" style="cursor:pointer;">
      <div class="stat-n" id="st-done">0</div>
      <div class="stat-l" style="display:flex;align-items:center;gap:4px;">Today <span id="today-arrow" style="font-size:10px;">▼</span></div>
    </div>
  </div>
  <div class="notif-bar" id="notif-bar">
    <span>🔔</span><span id="notif-text">New request</span>
  </div>
  <div id="my-rides-panel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg2); z-index:100; overflow-y:auto;">
    <div style="background:var(--bg); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10;">
      <button onclick="toggleMyRides()" style="background:none; border:1px solid var(--border); border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; color:var(--text);">← Back</button>
      <span style="font-size:15px; font-weight:600; color:var(--text);">My rides today</span>
    </div>
    <div id="my-rides-list" style="padding:12px 14px;"></div>
  </div>
  <div class="body" id="trips-body"></div>
</div>

<script>
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

let me = null;
let trips = {};
let notifOk = false;
let prevPendingCount = -1;
let selDriver = null;
let pin = '';

const SECTION_ORDER = [
  { key: 'B', label: 'Room blocks' },
  { key: 'E', label: 'Stations' },
  { key: 'R', label: 'Restaurants' },
];

function buildLogin() {
  const grid = document.getElementById('driver-grid');
  DRIVERS.forEach(d => {
    const b = document.createElement('button');
    b.className = 'd-btn';
    b.textContent = d.name;
    b.onclick = () => {
      document.querySelectorAll('.d-btn').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      selDriver = d; pin = '';
      updateDots();
      document.getElementById('pin-err').textContent = '';
    };
    grid.appendChild(b);
  });
  const pad = document.getElementById('numpad');
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k => {
    const b = document.createElement('button');
    b.className = 'n-btn' + (k === '⌫' ? ' del' : '');
    b.textContent = k;
    if (k === '') { b.style.visibility = 'hidden'; pad.appendChild(b); return; }
    b.onclick = () => k === '⌫' ? delPin() : addPin(k);
    pad.appendChild(b);
  });
}

function addPin(k) {
  if (!selDriver) { document.getElementById('pin-err').textContent = 'Please select your name first'; return; }
  if (pin.length >= 4) return;
  pin += k; updateDots();
  if (pin.length === 4) checkPin();
}
function delPin() {
  pin = pin.slice(0, -1); updateDots();
  document.getElementById('pin-err').textContent = '';
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('err'));
}
function updateDots() {
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < pin.length);
    d.classList.remove('err');
  }
}
function checkPin() {
  if (pin === selDriver.pin) {
    me = selDriver.name;
    document.getElementById('screen-login').style.display = 'none';
    document.getElementById('screen-dash').style.display  = 'block';
    document.getElementById('active-name').textContent    = me;
    askNotifPermission();
    startListening();
  } else {
    document.querySelectorAll('.dot').forEach(d => d.classList.add('err'));
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    setTimeout(() => { pin = ''; updateDots(); document.getElementById('pin-err').textContent = ''; }, 900);
  }
}
function doLogout() {
  db.ref('requests').off();
  me = null; trips = {}; pin = ''; selDriver = null;
  prevPendingCount = -1;
  document.querySelectorAll('.d-btn').forEach(b => b.classList.remove('sel'));
  updateDots();
  document.getElementById('pin-err').textContent = '';
  document.getElementById('screen-dash').style.display  = 'none';
  document.getElementById('screen-login').style.display = 'flex';
}

async function askNotifPermission() {
  if ('Notification' in window) {
    const p = await Notification.requestPermission();
    notifOk = p === 'granted';
    if (!notifOk) {
      alert('Please allow notifications in your browser settings to receive ride alerts.');
    }
  }
}

function notify(body) {
  // Visual banner always
  const bar = document.getElementById('notif-bar');
  document.getElementById('notif-text').textContent = body;
  bar.style.display = 'flex';
  setTimeout(() => { bar.style.display = 'none'; }, 8000);
  // Push notification
  if (notifOk) {
    try { new Notification('🛺 New buggy request', { body, requireInteraction: true }); } catch(e) {}
  }
  // Audio beep as fallback
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

function startListening() {
  db.ref('requests').on('value', snap => {
    trips = snap.val() || {};
    render();
  });
}

function accept(key) {
  const t = trips[key];
  if (!t || t.status !== 'pending') return;
  db.ref('requests/' + key).update({ status: 'accepted', driver: me, acceptedAt: Date.now() });
}

function complete(key) {
  const t = trips[key];
  if (!t || t.status !== 'accepted' || t.driver !== me) return;
  db.ref('requests/' + key).update({ status: 'completed', completedAt: Date.now() });
}

function ageInfo(createdAt) {
  const mins = Math.floor((Date.now() - createdAt) / 60000);
  const label = mins < 1 ? 'Just now' : mins === 1 ? '1 min ago' : `${mins} min ago`;
  const cls   = mins < 5 ? 'fresh' : mins < 12 ? 'mid' : 'old';
  return { label, cls };
}

function render() {
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const list = Object.entries(trips).map(([k, v]) => ({ ...v, _key: k }));
  const pending   = list.filter(t => t.status === 'pending');
  const accepted  = list.filter(t => t.status === 'accepted');
  const completed = list.filter(t => t.status === 'completed' && t.driver === me);

  const pCount = pending.length;
  if (prevPendingCount >= 0 && pCount > prevPendingCount) {
    const diff = pCount - prevPendingCount;
    notify(`${diff} new pending request${diff > 1 ? 's' : ''}`);
  }
  prevPendingCount = pCount;

  document.getElementById('st-pend').textContent = pending.length;
  document.getElementById('st-acc').textContent  = accepted.length;
  document.getElementById('st-done').textContent = completed.length;

  const sortFn = (a, b) => {
    if (a.priority !== b.priority) return a.priority ? -1 : 1;
    return a.createdAt - b.createdAt;
  };
  const active = [...pending.sort(sortFn), ...accepted.sort(sortFn)];
  // completed hidden from main view — shown in My rides panel
  const all = [...active];

  const bySection = { R: [], E: [], B: [] };
  all.forEach(t => { if (bySection[t.type]) bySection[t.type].push(t); });

  let html = '';
  SECTION_ORDER.forEach(sec => {
    const items = bySection[sec.key];
    if (!items.length) return;
    html += `<div class="sec-hd"><span class="sec-name">${sec.label}</span><span class="sec-ct">${items.length} active</span></div>`;
    items.forEach(t => {
      const ts = new Date(t.createdAt).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      const { label: ageLabel, cls: ageCls } = ageInfo(t.createdAt);
      const prioBadge = t.priority ? '<span class="prio-tag">⚡ PRIORITY</span>' : '';
      const roomChip  = t.room ? `<span class="chip">🚪 Room ${t.room}</span>` : '';

      let cardClass = t.status;
      if (t.status === 'pending' && t.priority) cardClass = 'prio';
      if (t.status === 'accepted' && t.driver === me) cardClass = 'mine';

      let statusChip = '';
      if (t.status === 'pending') {
        statusChip = `<span class="age ${ageCls}">${ageLabel}</span>`;
      } else if (t.status === 'accepted') {
        const cls = t.driver === me ? 'mine' : '';
        statusChip = `<span class="assigned ${cls}">🚗 ${t.driver} — on the way</span>`;
      }

      let action = '';
      if (t.status === 'pending') {
        action = `<button class="act-btn accept" onclick="accept('${t._key}')">🚗 Accept</button>`;
      } else if (t.status === 'accepted' && t.driver === me) {
        action = `<button class="act-btn complete" onclick="complete('${t._key}')">✓ Finish ride</button>`;
      }

      html += `<div class="trip ${cardClass}">
        <div class="trip-main">
          <span class="trip-loc">${t.station}</span>
          ${prioBadge}
          <div class="trip-meta">
            <span class="chip">👥 ${t.pax} ${t.pax===1?'pax':'pax'}</span>
            ${roomChip ? '<span class="divider"></span>' + roomChip : ''}
            <span class="divider"></span>
            ${statusChip}
          </div>
        </div>
        ${action}
      </div>`;
    });
  });

  if (!all.length) html = '<div class="empty">No active requests ✓</div>';
  document.getElementById('trips-body').innerHTML = html;

  // update My rides panel
  const myDone = completed.sort((a,b) => (b.completedAt||0) - (a.completedAt||0));
  const myRidesList = document.getElementById('my-rides-list');
  if (!myDone.length) {
    myRidesList.innerHTML = '<div style="text-align:center;padding:3rem 1rem;font-size:14px;color:var(--text2);">No completed rides yet</div>';
  } else {
    myRidesList.innerHTML = myDone.map((t, i) => {
      const from  = new Date(t.createdAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      const to    = t.completedAt ? new Date(t.completedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '—';
      const mins  = t.completedAt ? Math.round((t.completedAt - t.createdAt) / 60000) : '—';
      const prio  = t.priority ? '<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:2px 6px;border-radius:999px;font-weight:600;">⚡ PRIORITY</span>' : '';
      return `<div style="background:var(--bg);border:1px solid var(--border);border-left:3px solid #22c55e;border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:13px;font-weight:600;color:var(--text2);">#${myDone.length - i}</span>
            <span style="font-size:15px;font-weight:600;color:var(--text);">${t.station}</span>
            ${prio}
          </div>
          <span style="font-size:11px;color:var(--text2);">${from}</span>
        </div>
        <div style="display:flex;gap:12px;font-size:12px;color:var(--text2);">
          <span>👥 ${t.pax} ${t.pax===1?'passenger':'passengers'}</span>
          <span>🕐 ${from} → ${to}</span>
          <span style="color:#16a34a;font-weight:600;">✓ ${mins} min</span>
        </div>
      </div>`;
    }).join('');
  }
}

function toggleMyRides() {
  const panel = document.getElementById('my-rides-panel');
  const open  = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  const arrow = document.getElementById('today-arrow');
  if (arrow) arrow.textContent = open ? '▲' : '▼';
}

buildLogin();
</script>
</body>
</html>
